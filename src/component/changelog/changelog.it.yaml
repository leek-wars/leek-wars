248:
  title: "Classifiche dei boss, hook di combattimento, interi grandi e nuovi trofei."
  added:
    - "Classifiche dei boss: 4 tipi (più veloce, meno porri, livello più basso, primi). #img_248_boss_rankings"
    - "#ai Tipo `big_integer`: interi di dimensione illimitata con il suffisso `L`. (grazie a Batary) #img_248_big_integer"
    - "#ai Hook `beforeFight()` e `afterFight()`: chiamati prima del turno 1 e dopo il combattimento. #img_248_hooks"
    - "#ai `setLoadout(name)`: applica un loadout per questo combattimento, da usare in `beforeFight()`."
    - "#ai Funzione `getWinner()`: recupera il lato della squadra vincente da `afterFight()`."
    - "Bazooka al plutonio: nuova arma rara che trasforma parte dei danni subiti in resistenza. #img_248_plutonium_bazooka"
    - "Chip dei boss implementati e animati: Palla di fuoco, Shuriken, Kemuridama, Trabucco, Tuono."
    - "Quattro nuovi cappelli: berretto con piuma, cappello steampunk, bachi da marinaio e invisibile. #img_248_hats"
    - "18 nuovi trofei: git, equipaggiamenti rapidi, boss x1000, pozioni di trifoglio e like. #img_248_trophies"
    - "Banner visitatore sulle pagine pubbliche: crea il tuo porro e iscriviti senza cambiare pagina. #img_248_visitor_banner"
    - "#ai Concatenamento opzionale `obj?.campo` e `obj?.metodo()`: null se l'oggetto è null."
    - "#ai Accesso e slice sulle stringhe: `s[i]` per un carattere, `s[a:b:c]` per una sottostringa."
    - "#ai Intervallo di interi in un set `<1..10>` e nuova funzione `setFilter()`."
    - "#ai Funzioni di bit: `bitLength`, `setBit`, `testBit`, `bitCount`, `signum`, `trailingZeros`."
    - "#ai Annotazioni LeekScript: `@unused`, `@deprecated`, `@pure`, `@override`, `@tailrec`, `@todo`. #img_248_annotations"
    - "Armi dimenticate preferite nell'editor di equipaggiamento, ordinate per priorità. #img_248_forgotten_weapons"
    - "Clona un repository git remoto direttamente dall'editor (File > Clona un repo git). #img_248_git_clone"
    - "Collega le tue istanze git self-hosted: GitHub Enterprise, GitLab, Bitbucket DC, Forgejo. #img_248_git_selfhosted"
    - "Pulsante « Compatta il repository » (git gc) nel menu dell'editor per ridurne le dimensioni."
    - "#ai Contatore di riferimenti su ogni variabile globale, come per funzioni e classi. #img_248_global_codelens"
    - "#ai Supporto dei file `.md`, `.txt`, `.json`, `.yaml` e `.gitignore` con evidenziazione adatta."
    - "#ai Funzione `getChestType(entità)` e costanti `CHEST_WOOD`, `CHEST_IRON`, `CHEST_DIAMOND`."
    - "Modalità tabella ordinabile nella pagina della cronologia, con ordinamento e paginazione. #img_248_history_table"
    - "Passa sopra un combattimento per un'anteprima: durata, talento, trofei e bonus. #img_248_fight_tooltip"
    - "Contatore in tempo reale dei giocatori in coda per le arene, nell'orto e nel menu. #img_248_arena_counter"
    - "I titoli dell'enciclopedia hanno un'ancora cliccabile per condividere una sezione precisa. #img_248_encyclo_anchors"
    - "Formule matematiche (LaTeX) mostrate nelle pagine dell'enciclopedia. (grazie a hypernavet) #img_248_latex"
    - "Suggerimenti di cappelli e colori da acquistare, con anteprima dal vivo sul tuo porro. #img_248_hat_suggestions"
    - "L'uso di una Pozione di trifoglio III è annunciato nelle chat pubbliche."
    - "Il seme e il lato scelti nella sfida sono memorizzati da un combattimento all'altro."
    - "Nuovo banner di convalida dell'account: ricompense mostrate e convalida in un clic. #img_248_verify_banner"
    - "Convalida via e-mail: 20 combattimenti, 50 cristalli, 10.000 habs e un cappello all'attivazione. #img_248_welcome"
    - "Nuovo motivo di segnalazione per i nomi GitHub scorretti."
  improved:
    - "#ai `getAIID()` è deprecato e ora restituisce il nome del file dell'IA, come `getAIName()`."
    - "#ai Map e Set mantengono l'ordine di inserimento nell'iterazione, come in Python o JS."
    - "#ai Il narrowing funziona sui campi: `if (this.x) { this.x.m() }` senza `this.x!`."
    - "#ai `integer` verso `real` (es. `sqrt(integer)`) non è più segnalato come conversione pericolosa."
    - "#ai Visibilità `private` e `protected` ed ereditarietà del costruttore ora rispettate."
    - "#ai Analisi del codice nell'editor fino a 2x più veloce sulle IA grandi."
    - "#ai Simulazione di combattimento accelerata: movimenti, gittate ed effetti ottimizzati."
    - "#ai Avviso di codice morto su funzioni e variabili globali mai usate (modalità rigorosa). #img_248_unused_warning"
    - "#ai Documentazione al passaggio del mouse sulle annotazioni LeekScript."
    - "Editor di equipaggiamento: contatori dinamici, conferma delle modifiche, tema scuro e mobile. #img_248_loadout_counters"
    - "Popup di attesa arena arricchito: scelta del porro, modalità preferita e contatore live. #img_248_arena_popup"
    - "Notifiche delle arene più precise: viene mostrato il numero di porri affrontati."
    - "Pannello azioni del combattimento scorrevole: cronologia libera, caricamento progressivo."
    - "Trofei: difficoltà corrette, Irreprensibile finalmente sbloccabile e Blitzkrieg allentato."
    - "Mercato: anteprima di cappelli e colori direttamente sui tuoi porri."
    - "Banca: carta pacchetto interamente cliccabile e banner del pacchetto adatto alla provenienza."
    - "Il pacchetto da 50 combattimenti è acquistabile in habs anche se ti restano combattimenti."
    - "Accesso tramite nickname senza distinzione tra maiuscole e minuscole, più comodo su mobile."
    - "Accessibilità: zoom mobile, contrasto, riduzione delle animazioni e navigazione da tastiera."
    - "Pagina Informazioni: pulsanti Instagram e LinkedIn e contatore di stelle GitHub. #img_248_about"
    - "Caricamento delle pagine e matchmaking più veloci."
    - "I log della torretta sono ora visibili a tutta la squadra."
    - "Migliorate le icone di installazione e il colore della barra degli indirizzi su Android."
    - "Rielaborate le e-mail di iscrizione e di notifica (oggetti, contenuto, disiscrizione)."
    - "Collegamento Mercato riposizionato sopra Inventario nel menu."
    - "#ai Nuovi file vuoti per default (invece del codice di esempio), tranne il primo file di un account."
    - "#ai Il pannello dei problemi si chiude quando errori, avvisi e todo sono risolti."
    - "Il tutorial introduttivo non ha più il pulsante Salta: avanza con le tue azioni reali."
    - "La conferma di disconnessione elenca gli account connessi da disconnettere. #img_248_logout"
    - "Forum: i filtri e l'ordinamento sono memorizzati per ogni categoria."
  fixed:
    - "#ai `super.metodo()` inesistente: errore chiaro nell'editor invece di un errore in combattimento."
    - "#ai IA che non compilavano in combattimento funzionano di nuovo (lambda tipizzate, `*=`, cast)."
    - "#ai `m[k]++` su una chiave assente parte da 0 invece di un risultato errato e lento."
    - "#ai Le IA in LeekScript 2 che usano `AND`, `OR` o `NOT` non vanno più in crash."
    - "#ai `jsonEncode` gestisce i riferimenti condivisi e `jsonDecode` resiste ai JSON troppo annidati."
    - "#ai Modificare un file incluso ricompila bene l'IA, niente più codice obsoleto eseguito."
    - "Il link di reset della password ora funziona da qualsiasi dispositivo."
    - "Accesso Google e GitHub corretto per gli account in fase di convalida."
    - "Conto alla rovescia del prossimo combattimento corretto ovunque (mezzanotte, ora di Parigi)."
    - "Cambiare tipo di combattimento nel test non rimuove più i nemici aggiunti."
    - "Combattimenti personalizzati: celle di partenza distinte e vincitore corretto in battle royale."
    - "Gli ostacoli delle mappe di test non scompaiono più in combattimento."
    - "PV del Colosso sincronizzati tra client e server: niente più morti con vita ancora mostrata."
    - "L'icona di un chip ad area appare solo sui bersagli realmente colpiti."
    - "I rapporti mostrano il nome dello schema nelle ricompense invece di un asterisco."
    - "Niente più trofei duplicati o precedenti cambiando pagina o in avanzamento rapido."
    - "I partecipanti possono di nuovo visualizzare un combattimento con un trofeo segreto."
    - "Cronologia delle sfide: il vincitore corretto appare per i combattimenti avviati da destra."
    - "I combattimenti avviati nello stesso secondo sono ora ordinati correttamente."
    - "Git: IA modificate da pull/checkout, revert su nomi speciali ed errori delle azioni corretti."
    - "Chat: campanella sui canali mai aperti, indentazione dei blocchi di codice e raggruppamento."
    - "L'editor dell'enciclopedia non salta più durante la digitazione."
    - "Forum: messaggi/topic vuoti bloccati, popup dei votanti sincronizzato, evidenziazione ricerca."
    - "La campanella di notifica non resta più erroneamente accesa dopo un aggiornamento."
    - "Bandiere dei paesi non più deformate su Safari e iPad."
    - "Modificare l'IA di un porro in uno scenario predefinito non causa più un 404. (grazie a Kraspen)"
    - "La sessione viene invalidata quando un account viene eliminato."
    - "Coda dell'arena: la visualizzazione non rimane più bloccata dopo aver cambiato account. (grazie a NewSlash)"
    - "Titoli di porro e allevatore: ordine delle parole e accordo di genere corretti per lingua (italiano, spagnolo, portoghese). (grazie a Casanova)"
    - "Chat: un URL seguito da \" o > non assorbe più il testo successivo, che permetteva di creare link con testo ingannevole."
