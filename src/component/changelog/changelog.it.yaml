    - "#ai Funzioni setBit, testBit e bitLength per i BigInteger (grazie a Batary)."
    - "#ai Costanti `EROSION_DAMAGE`, `EROSION_POISON` e `EROSION_CRITICAL_MODIFIER` per i tassi di erosione (grazie a fujiwar)."
    - "Comandi chat `/war`, `/chest`, `/coloss` per invitare a un tipo specifico di arena (grazie a Kraspen)."
  improved:
    - "Popup di conferma prima della disconnessione (grazie a FdHP)."
    - "Rinnovamento della banca di cristalli con pacchetti e bonus progressivi. #img_247_bank"
    - "Modalità Colosso: moltiplicatore di statistiche aumentato da x2 a x3."
    - "#ai Narrowing esteso: assegnamenti, instanceof su proprietà, early-return nei metodi."
    - "Audit completo delle traduzioni: ~2400 chiavi aggiunte e correzioni nelle 16 lingue."
    - "Caricamento dinamico dei dati di gioco: avvio più rapido e bundle più leggero."
    - "Pannello di riferimenti nell'enciclopedia: pagine figlie, traduzioni, backlink."
    - "#ai Editor più fluido sui file grandi grazie al web worker di Monaco."
    - "#ai Tooltip di Monaco ora visualizzati sopra il pannello Problemi."
    - "Uscita automatica dall'arena quando non ci sono più combattimenti disponibili."
    - "Re-iscrizione automatica all'arena dopo un ricaricamento della pagina."
    - "Retry automatico in caso di errore di limitazione delle richieste."
    - "Immagini degli oggetti caricate su richiesta nel mercato e nell'inventario."
    - "Tema XP caricato dinamicamente: avvio più rapido sul tema moderno."
    - "Pulsanti PayPal adattati al tema scuro."
  fixed:
    - "Combattimento boss: allevatori senza porri ingaggiati non più reindirizzati (grazie a fabou)."
    - "Pulsanti « Rigioca » / « Rivincita » di una sfida miravano a se stessi (grazie a fabou)."
    - "Numerose correzioni di assegnazione dei trofei (Piromane, Stuntman, Devastatore, ecc.)."
    - "Crash Safari nei rapporti di combattimento (switch/radio)."
    - "Scorciatoie di sistema (Win+E, ecc.) che modificavano i parametri di combattimento."
    - "Ripristino dello stato di sfida tra i combattimenti nei rapporti."
    - "Grassetto renderizzato male nel toast di salvataggio IA."
    - "L'URL dell'Orto con un id di porro non valido non crasha più."
    - "Avatar obsoleti nei quadrati delle notifiche."
    - "Colore blu che si propagava a tutto il sito nel tema scuro."
    - "Vulnerabilità XSS nel markdown dell'enciclopedia e del forum."
    - "Pagina di errore su un account già attivato sostituita da un redirect."
    - "Arena re-iscritta con il porro dell'account precedente dopo uno switch."
    - "Guard null sul canvas e l'HUD del player per evitare crash Safari."
    - "Correzione delle traduzioni del tutorial."
    - "#ai Stack trace dei crash IA mostrati anche dopo il raggiungimento del limite di debug (grazie a Kraspen)."

