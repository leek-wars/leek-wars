    - "Paga con carta di credito nel negozio, tramite Stripe. #img_249_payment"
    - "Filtri per risultato e ricerca degli avversari nella cronologia dei combattimenti. #img_249_history_filters"
    - "Palette dei comandi nell'editor con Ctrl+Shift+P. #img_249_command_palette"
