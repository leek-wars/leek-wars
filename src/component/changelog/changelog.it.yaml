    - "Corpi di porri invisibili nei combattimenti su Firefox."
    - "Il guantone e il rinvaso non scambiano più il bersaglio sbagliato."
    - "Sezione della barra della vita mancante dopo una resurrezione."
    - "Diverse correzioni alle reazioni emoji, al codice e al LaTeX della chat."
    - "Ricerca del forum: corretti il loop di reindirizzamento e le categorie multilingua."
    - "Editor: pannello di divisione e cache del codice resi affidabili."
