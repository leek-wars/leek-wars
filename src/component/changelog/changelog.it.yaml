    - "Pulsante per rinnovare la vetrina di oggetti del negozio."
    - "Il tema dell'editor è automatico: chiaro o scuro come il sito."
    - "Casella IA di base alla creazione di un file, per partire dal codice d'esempio del linguaggio."
