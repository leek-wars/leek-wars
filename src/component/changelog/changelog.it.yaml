    - "Armi ordinate per livello nel selettore dell'avversario di prova."
    - "La classifica dei boss ricorda l'ultimo boss e la modalità consultati."
    - "La barra delle azioni di un topic si ripete in alto quando è lungo."
    - "Finestra che invita ad avviare il tutorial LeekScript. #img_249_tutorial_dialog"
    - "Icone dei trofei adattate alla modalità scura."
    - "Combattimenti compressi lato server per un archivio più leggero."
    - "I pacchetti di combattimenti acquistati arrivano nell'inventario (da attivare) invece di essere accreditati subito, utilizzabili dall'orto quando non hai più combattimenti."
    - "La rimozione automatica dall'orto dopo una serie di sconfitte richiede ora avversari distinti."
    - "#ai Le funzioni punto d'ingresso non sono più segnalate come inutilizzate."
    - "#ai Validazione delle IA Python nell'editor: nomi non definiti, errori di tipo e di sintassi segnalati in tempo reale."
