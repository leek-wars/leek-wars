<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Mise à jour - Leek Wars</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#6cb8e8 0%,#9fd4f2 55%,#cdecff 100%);
    color:#fff;min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px 18px;overflow:hidden;position:relative}
  /* soleil */
  body::before{content:"";position:fixed;top:-90px;right:-90px;width:320px;height:320px;
    border-radius:50%;background:radial-gradient(circle,#fff7cf 0%,rgba(255,243,170,.55) 40%,rgba(255,243,170,0) 70%);
    pointer-events:none}
  .top{text-align:center;z-index:2;margin-bottom:18px;animation:rise .6s ease both}
  .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    background:rgba(255,255,255,.22);padding:5px 12px;border-radius:20px;backdrop-filter:blur(4px);margin-bottom:12px}
  h1{font-size:34px;line-height:1.1;margin:0 0 8px;font-weight:800;text-shadow:0 3px 14px rgba(0,60,110,.35)}
  .sub{font-size:16px;margin:0;opacity:.95;text-shadow:0 2px 8px rgba(0,60,110,.25)}
  .stage{width:min(1040px,94vw);z-index:2;animation:rise .7s ease both}
  canvas{width:100%;height:auto;display:block;border-radius:18px;cursor:pointer;
    touch-action:manipulation;box-shadow:0 22px 60px rgba(0,50,90,.35),0 0 0 1px rgba(255,255,255,.4) inset}
  .bottom{text-align:center;z-index:2;margin-top:16px;animation:rise .8s ease both}
  .hint{display:inline-block;font-size:13px;font-weight:600;background:rgba(0,0,0,.16);
    padding:7px 14px;border-radius:20px;backdrop-filter:blur(4px)}
  .en{font-size:13px;opacity:.85;margin:12px 0 0}
  kbd{background:rgba(255,255,255,.85);color:#2e3d12;border-radius:5px;padding:1px 7px;
    font-family:inherit;font-weight:700;font-size:12px;box-shadow:0 2px 0 rgba(0,0,0,.2)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media(max-width:560px){h1{font-size:26px}.sub{font-size:14px}}
</style>
</head>

  function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
  function gameOver(){over=true;best=Math.max(best,Math.floor(score));localStorage.setItem('lw_maj_best',best);}
  function ambient(dt){for(var i=0;i<clouds.length;i++){var c=clouds[i];c.x-=dt*16*c.s;if(c.x<-140)c.x=W+140;}}
  function update(dt){
    ambient(dt);
    if(!started||over){if(leek&&leek.onGround)leek.rot=Math.sin(performance.now()/220)*.05;return;}
    speed+=dt*7;score+=dt*speed*.05;
    leek.vy+=2200*dt;leek.y+=leek.vy*dt;
    if(leek.y>=GROUND-LEEK_H){leek.y=GROUND-LEEK_H;leek.vy=0;leek.onGround=true;}
    leek.rot=leek.onGround?Math.sin(performance.now()/90)*.06:.14;
    spawnT-=dt;if(spawnT<=0){spawnObstacle();spawnT=Math.max(.78,1.7-speed/850)+Math.random()*.55;}
    cloverT-=dt;if(cloverT<=0){spawnClover();cloverT=1.4+Math.random()*1.7;}
    groundOff=(groundOff+speed*dt)%46;
    var lw=leekW(),lbox={x:leek.x+lw*.26,y:leek.y+LEEK_H*.12,w:lw*.48,h:LEEK_H*.82};
    var i;
    for(i=0;i<obstacles.length;i++){var o=obstacles[i];o.x-=speed*dt;
      if(hit(lbox,{x:o.x+o.w*.24,y:o.y+o.h*.2,w:o.w*.52,h:o.h*.78}))gameOver();}
    obstacles=obstacles.filter(function(o){return o.x+o.w>-12;});
    for(i=0;i<clovers.length;i++){var c=clovers[i];c.x-=speed*dt;
      if(!c.got&&hit(lbox,{x:c.x,y:c.y,w:c.s,h:c.s})){c.got=true;score+=15;}}
    clovers=clovers.filter(function(c){return c.x+c.s>-12&&!c.got;});
  }
  function drawCloud(cx,cy,s){ctx.fillStyle='rgba(255,255,255,.9)';
    var p=[[0,0,26],[24,6,20],[-24,6,20],[10,-12,18],[-12,-10,16]];
    for(var i=0;i<p.length;i++){ctx.beginPath();ctx.ellipse(cx+p[i][0]*s,cy+p[i][1]*s,p[i][2]*s,p[i][2]*s*.78,0,0,7);ctx.fill();}}
  function draw(){
    var sky=ctx.createLinearGradient(0,0,0,GROUND);
    sky.addColorStop(0,'#aee2ff');sky.addColorStop(1,'#e6f6ff');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,GROUND);
    var i;
    for(i=0;i<clouds.length;i++)drawCloud(clouds[i].x,clouds[i].y,clouds[i].s);
    // sable
    var sand=ctx.createLinearGradient(0,GROUND,0,H);
    sand.addColorStop(0,'#f0e1b0');sand.addColorStop(1,'#e3cf95');
    ctx.fillStyle=sand;ctx.fillRect(0,GROUND,W,H-GROUND);
    ctx.strokeStyle='rgba(150,118,60,.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
    ctx.fillStyle='rgba(150,118,60,.42)';
    for(var x=-groundOff;x<W;x+=46)ctx.fillRect(x,GROUND+9,20,3);
    for(i=0;i<clovers.length;i++)ctx.drawImage(imgs.clover,clovers[i].x,clovers[i].y,clovers[i].s,clovers[i].s);
    for(i=0;i<obstacles.length;i++){var o=obstacles[i];ctx.drawImage(o.im,o.x,o.y,o.w,o.h);}
    var lw=leekW();
    ctx.save();ctx.translate(leek.x+lw/2,leek.y+LEEK_H);ctx.rotate(leek.rot);ctx.scale(-1,1);
    ctx.drawImage(imgs.leek,-lw/2,-LEEK_H,lw,LEEK_H);ctx.restore();
    // HUD
    ctx.fillStyle=DARK;ctx.font='bold 17px sans-serif';ctx.textAlign='right';
    ctx.fillText('Score '+Math.floor(score)+'      Best '+best,W-16,30);ctx.textAlign='left';
    if(!started&&!over){ctx.textAlign='center';ctx.fillStyle=DARK;
      ctx.font='800 30px sans-serif';ctx.fillText('Appuie sur Espace pour commencer',W/2,GROUND-120);
      ctx.globalAlpha=.7;ctx.font='16px sans-serif';
      ctx.fillText('Press Space to begin',W/2,GROUND-94);ctx.globalAlpha=1;ctx.textAlign='left';}
    if(over){ctx.textAlign='center';
      ctx.fillStyle='rgba(47,61,22,.12)';ctx.fillRect(W/2-150,H/2-52,300,90);
      ctx.fillStyle=DARK;ctx.font='800 34px sans-serif';ctx.fillText('Game Over',W/2,H/2-6);
      ctx.font='16px sans-serif';ctx.fillText('clic / espace pour rejouer',W/2,H/2+22);ctx.textAlign='left';}
  }
  function loop(now){var dt=Math.min(.05,(now-t0)/1000||0);t0=now;update(dt);draw();requestAnimationFrame(loop);}
  function start(){reset();t0=performance.now();requestAnimationFrame(loop);}
})();
</script>
</body>
</html>
